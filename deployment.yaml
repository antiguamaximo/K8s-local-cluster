apiVersion: apps/v1
kind: Deployment
metadata:
  name: check-specs-automation
spec:
  replicas: 2
  selector:
    matchLabels:
      app: check-specs-automation
  template:
    metadata:
      labels:
        app: check-specs-automation
    spec:
      containers:
        - name: check-specs-automation
          image: maximoa/check-specs-automation:v3
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
               requests:
                 memory: "64Mi"
                 cpu: "100m"
               limits:
                 memory: "128Mi"
                 cpu: "250m"
                 